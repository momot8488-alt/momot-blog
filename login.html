<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - MoMot 管理后台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="nav-logo">
        <span class="nav-logo-text">
          <span class="tm-top">TM</span>
        </span>
      </div>
      <h1>MoMot 管理后台</h1>
      <p>请输入密码以登录</p>
    </div>
    <!-- Step 1: 密码验证 -->
    <form id="login-form" class="login-form">
      <div class="form-group">
        <input type="password" id="login-password" class="form-input" placeholder="输入密码" autocomplete="current-password" autofocus>
      </div>
      <div id="login-error" class="login-error" style="display:none;">密码错误，请重试</div>
      <button type="submit" class="btn-login">登录</button>
    </form>

    <!-- Step 2: Token 配置（密码验证后显示） -->
    <div id="token-setup" class="login-form" style="display:none;">
      <p style="color:#aaa;font-size:0.9rem;margin-bottom:12px;">首次使用需配置 GitHub Token，用于同步文章数据。</p>
      <div class="form-group">
        <input type="text" id="token-input" class="form-input" placeholder="输入 GitHub Personal Access Token">
      </div>
      <div id="token-error" class="login-error" style="display:none;">Token 无效，请检查后重试</div>
      <button type="button" id="btn-token-save" class="btn-login">保存并进入后台</button>
      <button type="button" id="btn-token-skip" class="btn-login" style="background:#555;margin-top:8px;">跳过（仅本地模式）</button>
    </div>

    <a href="./index.html" class="login-back">&larr; 返回首页</a>
  </div>
</div>

<script>
(function() {
  var ADMIN_PWD = '8488';

  if (sessionStorage.getItem('momot_admin_auth') === 'true') {
    window.location.href = './admin.html';
    return;
  }

  var loginForm = document.getElementById('login-form');
  var tokenSetup = document.getElementById('token-setup');
  var pwdInput = document.getElementById('login-password');
  var errEl = document.getElementById('login-error');
  var tokenInput = document.getElementById('token-input');
  var tokenErr = document.getElementById('token-error');

  function showTokenStep() {
    loginForm.style.display = 'none';
    tokenSetup.style.display = 'block';
    tokenInput.focus();
  }

  function goToAdmin() {
    sessionStorage.setItem('momot_admin_auth', 'true');
    window.location.href = './admin.html';
  }

  function testToken(token, callback) {
    fetch('https://api.github.com/user', {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    }).then(function(res) {
      callback(res.ok);
    }).catch(function() {
      callback(false);
    });
  }

  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    if (pwdInput.value === ADMIN_PWD) {
      if (localStorage.getItem('momot_github_token')) {
        goToAdmin();
      } else {
        showTokenStep();
      }
    } else {
      errEl.style.display = 'block';
      pwdInput.value = '';
      pwdInput.focus();
    }
  });

  document.getElementById('btn-token-save').addEventListener('click', function() {
    var t = tokenInput.value.trim();
    if (!t) return;
    testToken(t, function(ok) {
      if (ok) {
        localStorage.setItem('momot_github_token', t);
        goToAdmin();
      } else {
        tokenErr.style.display = 'block';
      }
    });
  });

  document.getElementById('btn-token-skip').addEventListener('click', function() {
    goToAdmin();
  });
})();
</script>

</body>
</html>
